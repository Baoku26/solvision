<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>SolVision</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
